<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>refolongs 📚</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-dim: #eef2ff;

      --cat-me: #e11d48;
      --cat-ai: #7c3aed;
      --cat-ax: #0ea5e9;
      --cat-tools: #10b981;
      --cat-inspo: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    header p { font-size: 13px; color: var(--muted); }

    /* ── Filter bar ── */
    .filter-bar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .count-badge {
      font-size: 11px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 7px;
      margin-left: 4px;
    }

    /* ── Grid ── */
    .grid {
      padding: 16px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .15s, box-shadow .15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .card-author {
      font-size: 12px;
      color: var(--muted);
    }
    .card-memo {
      font-size: 12px;
      color: #6b7280;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-bottom {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .cat-label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* category colors */
    .cat-00-me         { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .cat-01-ai-education { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
    .cat-02-ax-cases   { background: #f0f9ff; color: #0369a1; border-color: #bae6fd; }
    .cat-03-tools      { background: #f0fdf4; color: #059669; border-color: #bbf7d0; }
    .cat-04-inspiration { background: #fffbeb; color: #b45309; border-color: #fde68a; }

    .dot-00-me         { background: var(--cat-me); }
    .dot-01-ai-education { background: var(--cat-ai); }
    .dot-02-ax-cases   { background: var(--cat-ax); }
    .dot-03-tools      { background: var(--cat-tools); }
    .dot-04-inspiration { background: var(--cat-inspo); }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 20px 16px 14px; }
      .filter-bar { padding: 10px 16px; }
      .grid { padding: 12px 16px; gap: 8px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>refolongs 📚</h1>
  <p>리서치 & 큐레이션 모음</p>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all" onclick="filter('all')">전체 <span class="count-badge" id="cnt-all">0</span></button>
  <button class="filter-btn" data-cat="00-me" onclick="filter('00-me')">내 이력 <span class="count-badge" id="cnt-00-me">0</span></button>
  <button class="filter-btn" data-cat="01-ai-education" onclick="filter('01-ai-education')">AI 교육 <span class="count-badge" id="cnt-01-ai-education">0</span></button>
  <button class="filter-btn" data-cat="02-ax-cases" onclick="filter('02-ax-cases')">AX 사례 <span class="count-badge" id="cnt-02-ax-cases">0</span></button>
  <button class="filter-btn" data-cat="03-tools" onclick="filter('03-tools')">도구 <span class="count-badge" id="cnt-03-tools">0</span></button>
  <button class="filter-btn" data-cat="04-inspiration" onclick="filter('04-inspiration')">영감 <span class="count-badge" id="cnt-04-inspiration">0</span></button>
</div>

<div class="grid" id="grid"></div>

<script>
// ────────────────────────────────────────────
// 📝 여기에 항목 추가하면 자동으로 카드 생성됨
// ────────────────────────────────────────────
const items = [
  // ── 내 이력 ──
  {
    title: "커리어렌즈 — AI 이력서 평가 서비스",
    author: "구민정",
    url: "https://career-lens.app",
    cat: "00-me",
    memo: "AI 면접관이 이력서를 평가해주는 서비스. 8년+ 멘토링 경험을 AI 프로덕트로. 2026 오픈 예정.",
    tags: ["#프로덕트", "#AI", "#이력서"],
    date: "2026",
  },
  {
    title: "실험마켓 — 수익화 실험 서비스",
    author: "구민정",
    url: "https://tryout-market-front.vercel.app",
    cat: "00-me",
    memo: "수익화 실험을 위한 서비스. 직접 기획·개발·운영.",
    tags: ["#프로덕트", "#솔로프리너"],
    date: "2025",
  },
  {
    title: "OKKY AI 콘텐츠 에이전트",
    author: "구민정",
    url: "https://congchu.github.io/okky-crew/news/index.html",
    cat: "00-me",
    memo: "브랜드 톤앤매너를 학습한 카드뉴스 자동 생성 에이전트. Claude 기반. 스토리형·기술형·보안형·토론형 4가지 스타일.",
    tags: ["#AI에이전트", "#콘텐츠자동화", "#Claude"],
    date: "2026",
  },
  {
    title: "현대오토에버 AI 페어프로그래밍 풀데이 강의",
    author: "구민정",
    url: "https://kurie-lab.vercel.app/lecture",
    cat: "00-me",
    memo: "임직원 대상 GitHub Copilot·ChatGPT 실습. 하루 8시간 풀데이. 코멘토 통해 출강.",
    tags: ["#기업출강", "#AI교육", "#풀데이"],
    date: "2024-07",
  },
  {
    title: "골프존 개발팀 AI 프로그래밍 강의",
    author: "구민정",
    url: "https://kurie-lab.vercel.app/lecture",
    cat: "00-me",
    memo: "현직 개발자 대상 AI 도구 실무 적용 강의.",
    tags: ["#기업출강", "#AI교육"],
    date: "2024-06",
  },
  {
    title: "신한투자증권 웹개발 강의 5회 연속 재계약",
    author: "구민정",
    url: "https://kurie-lab.vercel.app/lecture",
    cat: "00-me",
    memo: "프로디지털아카데미. HTML·CSS·React. 2023~2025 5회 재계약. 재계약률의 증거.",
    tags: ["#재계약", "#기업교육", "#React"],
    date: "2023~2025",
  },

  // ── AI 교육 리서치 ──
  {
    title: "Get Ship Done — Simpson Gyusup Sim",
    author: "Simpson Gyusup Sim",
    url: "https://www.linkedin.com/posts/simpsonsim_aitgkrht-sakqpqrqesuy-getshipdone-share-7436695861755125761-RdTC/",
    cat: "01-ai-education",
    memo: "비개발자 대상 바이브코딩 교육 포맷. 하루 6시간에 서비스 배포. 소수정예 + 결과물 보장 구조.",
    tags: ["#바이브코딩", "#비개발자", "#강의포맷"],
    date: "2026-03",
  },
];
// ────────────────────────────────────────────

const catLabel = {
  "00-me": "내 이력",
  "01-ai-education": "AI 교육",
  "02-ax-cases": "AX 사례",
  "03-tools": "도구",
  "04-inspiration": "영감",
};

let current = "all";

function render() {
  const grid = document.getElementById("grid");
  const filtered = current === "all" ? items : items.filter(i => i.cat === current);

  // update counts
  document.getElementById("cnt-all").textContent = items.length;
  ["00-me","01-ai-education","02-ax-cases","03-tools","04-inspiration"].forEach(c => {
    document.getElementById("cnt-" + c).textContent = items.filter(i => i.cat === c).length;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">항목이 없습니다.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${item.url}" target="_blank" rel="noopener">
      <div class="card-top">
        <span class="cat-dot dot-${item.cat}"></span>
        <span class="card-title">${item.title}</span>
      </div>
      ${item.author ? `<div class="card-author">${item.author} · ${item.date || ""}</div>` : ""}
      ${item.memo ? `<div class="card-memo">${item.memo}</div>` : ""}
      <div class="card-bottom">
        <span class="cat-label cat-${item.cat}">${catLabel[item.cat] || item.cat}</span>
        ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    </a>
  `).join("");
}

function filter(cat) {
  current = cat;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.cat === cat);
  });
  render();
}

render();
</script>
</body>
</html>
