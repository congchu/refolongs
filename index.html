    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-bg: #eef2ff;

      --cat-me: #e11d48;
      --cat-ai: #7c3aed;
      --cat-ax: #0ea5e9;
      --cat-tools: #10b981;
      --cat-inspo: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── GNB ── */
    .gnb {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .gnb-left { display: flex; align-items: center; gap: 20px; }
    .gnb-logo { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .gnb-tabs { display: flex; gap: 2px; }
    .gnb-tab {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .gnb-tab:hover { background: var(--bg); color: var(--text); }
    .gnb-tab.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      font-size: 14px;
    }
    .view-btn:hover { border-color: var(--accent); color: var(--accent); }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Filter bar ── */
    .filter-bar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .count-badge {
      font-size: 11px;
      background: #f3f4f6;
      color: var(--muted);
      border-radius: 999px;
      padding: 1px 6px;
      margin-left: 3px;
    }
    .filter-btn.active .count-badge { background: rgba(255,255,255,.25); color: #fff; }

    /* ── Content ── */
    .content { padding: 16px 24px; }

    /* ── Grid view ── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: border-color .15s, box-shadow .15s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-bg); }
    .card-top { display: flex; align-items: center; gap: 8px; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .card-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
    .card-memo { font-size: 12px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-bottom { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }

    /* ── List view ── */
    .list-view { display: flex; flex-direction: column; gap: 1px; }
    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s;
    }
    .list-item:hover { border-color: var(--accent); }
    .list-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .list-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-sub { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .list-right { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    /* ── Shared: cat labels & tags ── */
    .cat-label { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: var(--muted); border: 1px solid var(--border); white-space: nowrap; }

    .cat-00-me          { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .cat-01-ai-education { background: #f5f3ff; color: #6d28d9; border: 1px solid #ddd6fe; }
    .cat-02-ax-cases    { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
    .cat-03-tools       { background: #f0fdf4; color: #059669; border: 1px solid #bbf7d0; }
    .cat-04-inspiration  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

    .dot-00-me          { background: var(--cat-me); }
    .dot-01-ai-education { background: var(--cat-ai); }
    .dot-02-ax-cases    { background: var(--cat-ax); }
    .dot-03-tools       { background: var(--cat-tools); }
    .dot-04-inspiration  { background: var(--cat-inspo); }

    .empty { text-align: center; padding: 60px 0; color: var(--muted); }

    /* ── 레이아웃 (패널 있을 때) ── */
    .layout { display: flex; height: calc(100vh - 52px - 45px); overflow: hidden; }
    .main-area { flex: 1; overflow-y: auto; padding: 16px 24px; min-width: 0; }

    /* ── 상세 패널 ── */
    .detail-panel {
      width: 0;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width .25s ease;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open { width: 70%; }
    .detail-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .detail-header-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
    }
    .detail-close:hover { background: var(--bg); }
    .detail-actions {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .detail-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--accent-bg);
      border-radius: 6px;
      background: var(--accent-bg);
    }
    .detail-link:hover { background: #e0e7ff; }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      font-size: 13px;
      line-height: 1.7;
    }
    .detail-body h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .detail-body h2 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: var(--text); }
    .detail-body h3 { font-size: 13px; font-weight: 600; margin: 12px 0 6px; color: var(--muted); }
    .detail-body p { margin-bottom: 8px; color: #374151; }
    .detail-body ul, .detail-body ol { padding-left: 18px; margin-bottom: 8px; }
    .detail-body li { margin-bottom: 4px; color: #374151; }
    .detail-body table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
    .detail-body th { background: var(--bg); padding: 6px 10px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
    .detail-body td { padding: 6px 10px; border: 1px solid var(--border); }
    .detail-body code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .detail-body pre { background: #f3f4f6; padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 10px; }
    .detail-body pre code { background: none; padding: 0; }
    .detail-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin-bottom: 10px; }
    .detail-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .detail-loading { color: var(--muted); text-align: center; padding: 40px; }

    /* 선택된 아이템 강조 */
    .card.selected, .list-item.selected { border-color: var(--accent); background: var(--accent-bg); }

    @media (max-width: 768px) {
      .gnb { padding: 0 14px; height: 48px; gap: 10px; }
      .gnb-logo { font-size: 14px; }
      .gnb-tab { padding: 5px 10px; font-size: 12px; }
      #searchInput { width: 110px; font-size: 12px; }
      .filter-bar { padding: 8px 14px; gap: 5px; }
      .filter-btn { padding: 3px 10px; font-size: 11px; }
      .main-area { padding: 10px 14px; }
      .grid-view { grid-template-columns: 1fr; }
      .list-item { grid-template-columns: 14px 1fr; gap: 8px; padding: 9px 12px; }
      .list-right { display: none; }
      /* 모바일: 패널이 화면 전체를 덮음 */
      .detail-panel.open {
        width: 100% !important;
        position: fixed;
        top: 0; right: 0; bottom: 0;
        z-index: 200;
        border-left: none;
        height: 100dvh;
      }
      .detail-header { padding: 12px 16px; }
      .detail-body { padding: 14px 16px; font-size: 13px; }
    }
  </style>
</head>

  },
  {
    title: "Get Ship Done — Simpson Gyusup Sim",
    author: "Simpson Gyusup Sim",
    url: "https://www.linkedin.com/posts/simpsonsim_aitgkrht-sakqpqrqesuy-getshipdone-share-7436695861755125761-RdTC/",
    cat: "01-ai-education",
    memo: "비개발자 대상 바이브코딩 교육 포맷. 하루 6시간에 서비스 배포. 소수정예 + 결과물 보장 구조.",
    tags: ["#바이브코딩", "#비개발자", "#강의포맷"],
    date: "2026-03",
    cache: "cache/get-ship-done.md",
  },
];

// ── 설정 ──────────────────────────────────────
const catLabel = {
  "00-me": "내 이력",
  "01-ai-education": "AI 교육",
  "02-ax-cases": "AX 사례",
  "03-tools": "도구",
  "04-inspiration": "영감",
};

const refCats = ["01-ai-education", "02-ax-cases", "03-tools", "04-inspiration"];

let section = "ref";  // me | ref
let catFilter = "all";
let view = "list";    // list | grid (list = default)

// ── 섹션 변경 ─────────────────────────────────
function setSection(s) {
  section = s;
  catFilter = "all";
  document.querySelectorAll(".gnb-tab").forEach(b => b.classList.toggle("active", b.dataset.section === s));
  renderFilterBar();
  renderContent();
}

// ── 뷰 변경 ──────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById("btn-list").classList.toggle("active", v === "list");
  document.getElementById("btn-grid").classList.toggle("active", v === "grid");
  renderContent();
}

// ── 필터 변경 ────────────────────────────────
function setFilter(cat) {
  catFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
  renderContent();
}

// ── 현재 섹션 아이템 ─────────────────────────
function getSectionItems() {
  return section === "me"
    ? items.filter(i => i.cat === "00-me")
    : items.filter(i => i.cat !== "00-me");
}

// ── 필터바 렌더링 ─────────────────────────────
function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  const sectionItems = getSectionItems();

  let cats;
  if (section === "me") {
    cats = [];
  } else {
    cats = refCats.filter(c => sectionItems.some(i => i.cat === c));
  }

  const countAll = sectionItems.length;
  let html = `<button class="filter-btn ${catFilter === 'all' ? 'active' : ''}" data-cat="all" onclick="setFilter('all')">전체 <span class="count-badge">${countAll}</span></button>`;

  cats.forEach(c => {
    const cnt = sectionItems.filter(i => i.cat === c).length;
    html += `<button class="filter-btn ${catFilter === c ? 'active' : ''}" data-cat="${c}" onclick="setFilter('${c}')">${catLabel[c]} <span class="count-badge">${cnt}</span></button>`;
  });

  bar.innerHTML = html;
}

// ── 콘텐츠 렌더링 ────────────────────────────
function renderContent() {
  const container = document.getElementById("content");
  const sectionItems = getSectionItems();
  const query = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
  const catFiltered = catFilter === "all" ? sectionItems : sectionItems.filter(i => i.cat === catFilter);
  const filtered = query ? catFiltered.filter(i =>
    i.title.toLowerCase().includes(query) ||
    (i.author || "").toLowerCase().includes(query) ||
    (i.memo || "").toLowerCase().includes(query) ||
    (i.tags || []).some(t => t.toLowerCase().includes(query))
  ) : catFiltered;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">항목이 없습니다.</div>`;
    return;
  }

  if (view === "grid") {
    container.innerHTML = `<div class="grid-view">${filtered.map((item, i) => gridCard(item, i)).join("")}</div>`;
  } else {
    container.innerHTML = `<div class="list-view">${filtered.map((item, i) => listItem(item, i)).join("")}</div>`;
  }
}

// ── 카드 (그리드) ─────────────────────────────
function gridCard(item, idx) {
  return `
    <div class="card" onclick="openDetail(${idx})" style="cursor:pointer">
      <div class="card-top">
        <span class="cat-dot dot-${item.cat}"></span>
        <span class="card-title">${item.title}</span>
      </div>
      <div class="card-meta">
        ${item.author ? `<span>${item.author}</span>` : ""}
        ${item.date ? `<span>· ${item.date}</span>` : ""}
      </div>
      ${item.memo ? `<div class="card-memo">${item.memo}</div>` : ""}
      <div class="card-bottom">
        <span class="cat-label cat-${item.cat}">${catLabel[item.cat]}</span>
        ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    </div>`;
}

// ── 리스트 아이템 ─────────────────────────────
function listItem(item, idx) {
  return `
    <div class="list-item" onclick="openDetail(${idx})" style="cursor:pointer">
      <span class="cat-dot dot-${item.cat}"></span>
      <div class="list-main">
        <span class="list-title">${item.title}</span>
        <div class="list-sub">
          ${item.author ? `<span>${item.author}</span>` : ""}
          ${item.date ? `<span>· ${item.date}</span>` : ""}
          ${item.memo ? `<span>· ${item.memo.slice(0, 60)}${item.memo.length > 60 ? "…" : ""}</span>` : ""}
        </div>
      </div>
      <div class="list-right">
        <span class="cat-label cat-${item.cat}">${catLabel[item.cat]}</span>
        ${(item.tags || []).slice(0, 2).map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    </div>`;
}

// ── 상세 패널 ─────────────────────────────────
let selectedIdx = null;

function openDetail(idx) {
  const item = getCurrentFiltered()[idx];
  if (!item) return;

  selectedIdx = idx;
  document.querySelectorAll(".card, .list-item").forEach((el, i) => {
    el.classList.toggle("selected", i === idx);
  });

  const panel = document.getElementById("detailPanel");
  const titleEl = document.getElementById("detailTitle");
  const actionsEl = document.getElementById("detailActions");
  const bodyEl = document.getElementById("detailBody");

  titleEl.textContent = item.title;
  actionsEl.innerHTML = `<a class="detail-link" href="${item.url}" target="_blank" rel="noopener">↗ 원문 열기</a>`;
  panel.classList.add("open");

  if (item.cache) {
    bodyEl.innerHTML = `<div class="detail-loading">불러오는 중...</div>`;
    fetch(item.cache)
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(md => { bodyEl.innerHTML = marked.parse(md); })
      .catch(() => { bodyEl.innerHTML = `<div class="detail-loading">캐시 파일을 찾을 수 없습니다.<br><a href="${item.url}" target="_blank" style="color:var(--accent)">원문 바로 열기 →</a></div>`; });
  } else {
    bodyEl.innerHTML = `<div class="detail-loading">${item.memo || ""}<br><br><a href="${item.url}" target="_blank" style="color:var(--accent)">원문 바로 열기 →</a></div>`;
  }
}

function closeDetail() {
  selectedIdx = null;
  document.getElementById("detailPanel").classList.remove("open");
  document.querySelectorAll(".card, .list-item").forEach(el => el.classList.remove("selected"));
}

function getCurrentFiltered() {
  const sectionItems = getSectionItems();
  return catFilter === "all" ? sectionItems : sectionItems.filter(i => i.cat === catFilter);
}

// ── 초기화 ────────────────────────────────────
setView("list");
setSection("ref");
</script>
</body>
</html>
