<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>refolongs 📚</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ec;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-dim: #312e81;

      --cat-ai: #7c3aed;
      --cat-ax: #0ea5e9;
      --cat-tools: #10b981;
      --cat-inspo: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    header p { font-size: 13px; color: var(--muted); }

    /* ── Filter bar ── */
    .filter-bar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .count-badge {
      font-size: 11px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 7px;
      margin-left: 4px;
    }

    /* ── Grid ── */
    .grid {
      padding: 16px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .15s, box-shadow .15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .card-author {
      font-size: 12px;
      color: var(--muted);
    }
    .card-memo {
      font-size: 12px;
      color: #9ca3af;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-bottom {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .cat-label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* category colors */
    .cat-ai-education  { background: #3b0764; color: #c4b5fd; border-color: #6d28d9; }
    .cat-ax-cases      { background: #082f49; color: #7dd3fc; border-color: #0369a1; }
    .cat-tools         { background: #022c22; color: #6ee7b7; border-color: #059669; }
    .cat-inspiration   { background: #451a03; color: #fcd34d; border-color: #b45309; }

    .dot-ai-education  { background: var(--cat-ai); }
    .dot-ax-cases      { background: var(--cat-ax); }
    .dot-tools         { background: var(--cat-tools); }
    .dot-inspiration   { background: var(--cat-inspo); }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 20px 16px 14px; }
      .filter-bar { padding: 10px 16px; }
      .grid { padding: 12px 16px; gap: 8px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>refolongs 📚</h1>
  <p>리서치 & 큐레이션 모음</p>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all" onclick="filter('all')">전체 <span class="count-badge" id="cnt-all">0</span></button>
  <button class="filter-btn" data-cat="ai-education" onclick="filter('ai-education')">AI 교육 <span class="count-badge" id="cnt-ai-education">0</span></button>
  <button class="filter-btn" data-cat="ax-cases" onclick="filter('ax-cases')">AX 사례 <span class="count-badge" id="cnt-ax-cases">0</span></button>
  <button class="filter-btn" data-cat="tools" onclick="filter('tools')">도구 <span class="count-badge" id="cnt-tools">0</span></button>
  <button class="filter-btn" data-cat="inspiration" onclick="filter('inspiration')">영감 <span class="count-badge" id="cnt-inspiration">0</span></button>
</div>

<div class="grid" id="grid"></div>

<script>
// ────────────────────────────────────────────
// 📝 여기에 항목 추가하면 자동으로 카드 생성됨
// ────────────────────────────────────────────
const items = [
  {
    title: "Get Ship Done — Simpson Gyusup Sim",
    author: "Simpson Gyusup Sim",
    url: "https://www.linkedin.com/posts/simpsonsim_aitgkrht-sakqpqrqesuy-getshipdone-share-7436695861755125761-RdTC/",
    cat: "ai-education",
    memo: "비개발자 대상 바이브코딩 교육 포맷. 하루 6시간에 서비스 배포. 소수정예 + 결과물 보장 구조.",
    tags: ["#바이브코딩", "#비개발자", "#강의포맷"],
    date: "2026-03",
  },
];
// ────────────────────────────────────────────

const catLabel = {
  "ai-education": "AI 교육",
  "ax-cases": "AX 사례",
  "tools": "도구",
  "inspiration": "영감",
};

let current = "all";

function render() {
  const grid = document.getElementById("grid");
  const filtered = current === "all" ? items : items.filter(i => i.cat === current);

  // update counts
  document.getElementById("cnt-all").textContent = items.length;
  ["ai-education","ax-cases","tools","inspiration"].forEach(c => {
    document.getElementById("cnt-" + c).textContent = items.filter(i => i.cat === c).length;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">항목이 없습니다.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${item.url}" target="_blank" rel="noopener">
      <div class="card-top">
        <span class="cat-dot dot-${item.cat}"></span>
        <span class="card-title">${item.title}</span>
      </div>
      ${item.author ? `<div class="card-author">${item.author} · ${item.date || ""}</div>` : ""}
      ${item.memo ? `<div class="card-memo">${item.memo}</div>` : ""}
      <div class="card-bottom">
        <span class="cat-label cat-${item.cat}">${catLabel[item.cat] || item.cat}</span>
        ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    </a>
  `).join("");
}

function filter(cat) {
  current = cat;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.cat === cat);
  });
  render();
}

render();
</script>
</body>
</html>
